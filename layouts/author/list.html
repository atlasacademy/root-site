{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ with .Description }}<p>{{ . }}</p>{{ end }}
<ul class="post-list">
  {{ $author := .Params.slug }}
  {{ range where (where .Site.RegularPages "Type" "posts") "Params.authors" "intersect" (slice $author) }}
  <li><a href="{{ .RelPermalink }}">{{ .Title }}</a><br><span>{{ .Date.Format "2006-01-02" }}</span></li>
  {{ end }}
</ul>
{{ end }}
